        <img
          class="gallery-item"
          src="Resources/gal4.jpeg"
          alt="Gartenarbeit" />
        <img
          class="gallery-item"
          src="Resources/gal5.jpeg"
          alt="Gartenarbeit" />
        <img
          class="gallery-item"
          src="Resources/gal6.jpeg"
          alt="Gartenarbeit" />
        <img
          class="gallery-item"
          src="Resources/gal7.jpeg"
          alt="Gartenarbeit" />
        <img
          class="gallery-item"
          src="Resources/gal8.jpeg"
          alt="Gartenarbeit" />
        <img

        <img

          alt="Gartenarbeit" />
      </div>
    </main>

    <div id="lightbox" class="lightbox">
      <span class="close">&times;</span>
      <img class="lightbox-img" id="lightbox-img" />
      <div class="prev">&#10094;</div>
      <div class="next">&#10095;</div>
    </div>

    <script>
      const images = document.querySelectorAll(".gallery-item");
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const closeBtn = document.querySelector(".close");
      const nextBtn = document.querySelector(".next");
      const prevBtn = document.querySelector(".prev");

      let currentIndex = 0;

      images.forEach((img, index) => {
        img.addEventListener("click", () => {
          currentIndex = index;
          showImage();
          lightbox.style.display = "flex";
        });
      });

      function showImage() {
        lightboxImg.src = images[currentIndex].src;
      }

      nextBtn.addEventListener("click", () => {
        currentIndex = (currentIndex + 1) % images.length;
        showImage();
      });

      prevBtn.addEventListener("click", () => {
        currentIndex = (currentIndex - 1 + images.length) % images.length;
        showImage();
      });

      closeBtn.addEventListener("click", () => {
        lightbox.style.display = "none";
      });

      // Închide galeria dacă dai click în afara imaginii
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) {
          lightbox.style.display = "none";
        }
      });
    </script>

    <footer class="glass-footer">
      <p>© 2026 Zian Rund ums Haus – Alle Rechte vorbehalten.</p>
    </footer>
  </body>
</html>
